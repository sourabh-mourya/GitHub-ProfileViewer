<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Profile</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    text-align: center;
    width: 300px;
}

h1 {
    font-size: 24px;
    margin-bottom: 20px;
}

input {
    padding: 10px;
    width: 80%;
    margin-bottom: 10px;
    border-radius: 4px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    width: 80%;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}

.user-profile {
    margin-top: 20px;
    display: none;
    text-align: left;
}

.user-profile img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-bottom: 10px;
}

.profile-info {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.profile-info p {
    margin: 5px 0;
}

.profile-info a {
    color: #007BFF;
    text-decoration: none;
}

.profile-info a:hover {
    text-decoration: underline;
}

    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub User Profile</h1>
        <input type="text" id="text" placeholder="Enter GitHub Username">
        <button id="btn">Fetch Profile</button>

        <div id="userProfile" class="user-profile">
            <!-- User profile info will be inserted here -->
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
